<!DOCTYPE html>
<html>
<head>
    <title>Bed Occupancy</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
        }

        .header {
            background: #2f3640;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .legend {
            margin: 20px;
            text-align: center;
        }

        .legend span {
            margin: 0 15px;
            font-weight: bold;
        }

        .room {
            margin: 20px;
        }

        .room-title {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .beds {
            display: flex;
            flex-wrap: wrap;
        }

        .bed {
            width: 80px;
            height: 80px;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .free {
            background: #44bd32;
        }

        .occupied {
            background: #e84118;
        }

        .bed:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="header">
    Bed Occupancy Dashboard
</div>

<div class="legend">
    <span style="color:green;">🟩 Available</span>
    <span style="color:red;">🟥 Occupied</span>
</div>

<!-- ✅ USE room_data (NOT regroup) -->
{% for room in room_data %}

<div class="room">
    <div class="room-title">
        {{ room.room }}
    </div>

    <div class="beds">
        {% for bed in room.beds %}

            {% if bed.occupied %}
                <!-- 🔴 Occupied -->
                <a href="/admin/pgapp/tenant/"
                   class="bed occupied"
                   title="Occupied by {{ bed.tenant }}">
                    {{ bed.number }}
                </a>
            {% else %}
                <!-- 🟢 Free -->
                <a href="/admin/pgapp/tenant/add/"
                   class="bed free"
                   title="Available bed">
                    {{ bed.number }}
                </a>
            {% endif %}

        {% endfor %}
    </div>
</div>

{% empty %}
<p style="text-align:center;">No beds found ❌</p>
{% endfor %}

</body>
</html>
